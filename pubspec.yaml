name: edu_app
description: "EduApp - Inclusive Learning Platform for blind and deaf students."
publish_to: 'none'
version: 3.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_tts: ^4.2.0
  video_player: ^2.9.3
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/applogo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color: "#681B98"
  theme_color: "#681B98"
