name: edu_app
description: "EduApp - Inclusive Learning Platform for blind and deaf students."
publish_to: 'none'
version: 2.4.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_tts: ^4.2.0
  video_player: ^2.9.3
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
